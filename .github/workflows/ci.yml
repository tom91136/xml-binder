name: CI
on:
  push:
    branches:
    - main
    tags:
    - "v*"
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        jvm: [8, 11, 17, 21, 25]
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - uses: coursier/cache-action@v8
    - uses: VirtusLab/scala-cli-setup@v1
      with:
        power: true

    - name: Run unit tests
      run: scala-cli test . --jvm ${{ matrix.jvm }}

  check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - uses: coursier/cache-action@v8
    - uses: VirtusLab/scala-cli-setup@v1
      with:
        power: true

    - name: Check formatting
      run: scala-cli fmt . --check

    - name: Compile README examples
      run: scala-cli compile --markdown README.md --scala 3.3.5 -cp "$(scala-cli compile . --print-classpath)"
